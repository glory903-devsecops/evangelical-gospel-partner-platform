name: Android Release Build

on:
  workflow_dispatch: # 수동으로 배포할 때만 실행 (실수 방지)
  push:
    tags:
      - 'v*' # v1.0.0 같은 태그가 푸시될 때 실행

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up JDK 17
        uses: actions/setup-java@3a4ad32452863e75622d330f85d58b877f68bf34
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Flutter
        run: |
          git clone https://github.com/flutter/flutter.git -b stable /home/runner/flutter
          echo "/home/runner/flutter/bin" >> $GITHUB_PATH
          echo "/home/runner/flutter/bin/cache/dart-sdk/bin" >> $GITHUB_PATH

      - name: Decode Keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks
        continue-on-error: true # 시크릿이 아직 설정되지 않았을 경우를 대비

      - name: Create key.properties
        run: |
          echo "storePassword=${{ secrets.ANDROID_STORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}" >> android/key.properties
          echo "storeFile=upload-keystore.jks" >> android/key.properties
        continue-on-error: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build App Bundle
        run: flutter build appbundle --release

      - name: Upload App Bundle
        uses: actions/upload-artifact@4cea5370f19696c62c244e667ca8636b0638596f
        with:
          name: app-release-bundle
          path: build/app/outputs/bundle/release/app-release.aab
