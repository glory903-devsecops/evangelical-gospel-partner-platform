name: Android Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      # 2. Set up Java (Pinned SHA)
      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Install Flutter manually (to avoid nested action policy violations)
      - name: Install Flutter
        run: |
          git clone https://github.com/flutter/flutter.git -b stable /home/runner/flutter
          echo "/home/runner/flutter/bin" >> $GITHUB_PATH
          echo "/home/runner/flutter/bin/cache/dart-sdk/bin" >> $GITHUB_PATH

      - name: Flutter doctor
        run: flutter doctor

      - name: Get dependencies
        run: flutter pub get

      # 4. Build APK (Debug version for quick check)
      - name: Build APK
        run: flutter build apk --debug

      # 5. Upload Artifact
      - name: Upload APK
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: app-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
