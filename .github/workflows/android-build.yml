name: Android Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Set up Java
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Install Flutter manually (to avoid nested action policy violations)
      - name: Install Flutter
        run: |
          git clone https://github.com/flutter/flutter.git -b stable /home/runner/flutter
          echo "/home/runner/flutter/bin" >> $GITHUB_PATH
          echo "/home/runner/flutter/bin/cache/dart-sdk/bin" >> $GITHUB_PATH

      - name: Flutter doctor
        run: flutter doctor

      - name: Get dependencies
        run: flutter pub get

      # 4. Build APK (Debug version for quick check)
      - name: Build APK
        run: flutter build apk --debug

      # 5. Upload Artifact
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
